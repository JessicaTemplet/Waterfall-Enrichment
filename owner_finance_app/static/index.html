<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Finance Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 2rem;
    }

    /* ── Search form ── */
    .search-card {
      max-width: 900px;
      margin: 0 auto 2rem;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 1.5rem;
    }

    .form-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
      min-width: 180px;
    }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, select {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, select:focus {
      border-color: #3b82f6;
    }

    select option {
      background: #1e2330;
    }

    button.search-btn {
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.65rem 1.4rem;
      transition: background 0.15s;
      white-space: nowrap;
      align-self: flex-end;
    }

    button.search-btn:hover  { background: #2563eb; }
    button.search-btn:active { background: #1d4ed8; }
    button.search-btn:disabled { background: #334155; cursor: not-allowed; }

    /* ── Status bar ── */
    .status {
      max-width: 900px;
      margin: 0 auto 1rem;
      font-size: 0.85rem;
      color: #64748b;
      min-height: 1.2em;
    }

    .status.error { color: #f87171; }

    /* ── Results table ── */
    .results-wrap {
      max-width: 900px;
      margin: 0 auto;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead tr {
      background: #1e2330;
      border-bottom: 1px solid #2d3748;
    }

    th {
      padding: 0.75rem 0.9rem;
      text-align: left;
      font-weight: 600;
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    td {
      padding: 0.7rem 0.9rem;
      border-bottom: 1px solid #1e2330;
      vertical-align: top;
    }

    tbody tr:hover { background: #1e2330; }

    .listing-title a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
    }

    .listing-title a:hover { text-decoration: underline; }

    .price { color: #4ade80; font-weight: 600; }

    .dom-badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .dom-high  { background: #7f1d1d; color: #fca5a5; }
    .dom-med   { background: #78350f; color: #fcd34d; }
    .dom-low   { background: #1e3a5f; color: #93c5fd; }
    .dom-unknown { background: #1e293b; color: #94a3b8; }

    /* ── Source badges ── */
    .src-badge {
      display: inline-block;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .src-zillow     { background: #1a2744; color: #6366f1; border: 1px solid #312e81; }
    .src-realtor    { background: #2a1215; color: #f87171; border: 1px solid #7f1d1d; }
    .src-craigslist { background: #1a2a1a; color: #4ade80; border: 1px solid #166534; }

    .address-line { font-size: 0.78rem; color: #64748b; margin-top: 0.2rem; }
    .beds-baths   { font-size: 0.78rem; color: #94a3b8; }

    /* ── Enrich modal ── */
    .enrich-btn {
      background: #1e3a2f;
      border: 1px solid #166534;
      border-radius: 5px;
      color: #4ade80;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .enrich-btn:hover   { background: #14532d; }
    .enrich-btn.done    { background: #1e293b; border-color: #334155; color: #64748b; cursor: default; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #475569;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 0.75rem 1.2rem;
      font-size: 0.85rem;
      color: #e2e8f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      display: none;
      z-index: 100;
    }

    #toast.show { display: block; }
    #toast.ok   { border-color: #166534; }
    #toast.err  { border-color: #991b1b; }
  </style>
</head>
<body>

<header>
  <h1>Owner Finance Finder</h1>
  <p class="subtitle">Searches Craigslist for owner-financed properties filtered by days on market.</p>
</header>

<div class="search-card">
  <div class="form-row">
    <div class="field">
      <label for="location">City / Location</label>
      <input
        id="location"
        type="text"
        placeholder="e.g. houston, dallas, austin..."
        autocomplete="off"
      >
    </div>
    <div class="field" style="max-width: 220px;">
      <label for="min_days">Min Days on Market</label>
      <select id="min_days">
        <option value="60">60 days (2 months)</option>
        <option value="90">90 days (3 months)</option>
        <option value="120">120 days (4 months)</option>
        <option value="180">180 days (6 months)</option>
        <option value="30">30 days (1 month)</option>
        <option value="14">14 days (2 weeks)</option>
      </select>
    </div>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
  </div>
</div>

<div class="status" id="status"></div>

<div class="results-wrap" id="resultsWrap" style="display:none;">
  <table id="resultsTable">
    <thead>
      <tr>
        <th>Source</th>
        <th>Listing</th>
        <th>Price</th>
        <th>Beds / Baths</th>
        <th>Area</th>
        <th>Days on Market</th>
        <th>Posted</th>
        <th>Enrich Owner</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    No listings found matching your criteria. Try a smaller min_days or a different city.
  </div>
</div>

<div id="toast"></div>

<script>
  // Store listing data by index so onclick handlers can reference it safely
  // without embedding quotes inside HTML attributes.
  let listingStore = [];

  async function doSearch() {
    const location = document.getElementById('location').value.trim();
    const minDays  = parseInt(document.getElementById('min_days').value, 10);
    const btn      = document.getElementById('searchBtn');
    const status   = document.getElementById('status');

    if (!location) {
      status.textContent = 'Please enter a city or location.';
      status.className   = 'status error';
      return;
    }

    btn.disabled     = true;
    btn.innerHTML    = '<span class="spinner"></span>Searching...';
    status.className = 'status';
    status.innerHTML = '<span class="spinner"></span>Fetching listings from Craigslist...';
    document.getElementById('resultsWrap').style.display = 'none';

    try {
      const res  = await fetch('/api/search', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ location, min_days: minDays }),
      });
      const data = await res.json();

      if (data.error) {
        status.textContent = `Error: ${data.error}`;
        status.className   = 'status error';
        return;
      }

      renderResults(data, minDays);
    } catch (err) {
      status.textContent = `Request failed: ${err.message}`;
      status.className   = 'status error';
    } finally {
      btn.disabled  = false;
      btn.textContent = 'Search';
    }
  }

  function domBadge(days) {
    if (days === null || days === undefined) {
      return '<span class="dom-badge dom-unknown">unknown</span>';
    }
    const cls = days >= 180 ? 'dom-high' : days >= 60 ? 'dom-med' : 'dom-low';
    return `<span class="dom-badge ${cls}">${days}d</span>`;
  }

  function formatDate(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderResults(data, minDays) {
    const wrap   = document.getElementById('resultsWrap');
    const body   = document.getElementById('resultsBody');
    const empty  = document.getElementById('emptyState');
    const status = document.getElementById('status');

    body.innerHTML = '';
    listingStore   = data.listings;   // cache for onclick handlers
    wrap.style.display = 'block';

    const city = data.searched_city || '';

    if (data.listings.length === 0) {
      empty.style.display = 'block';
      document.getElementById('resultsTable').style.display = 'none';
      status.textContent = `No results for "${city}" with ${minDays}+ days on market.`;
      return;
    }

    empty.style.display  = 'none';
    document.getElementById('resultsTable').style.display = 'table';
    status.textContent = `Found ${data.total} listing(s) in ${city} on market ${minDays}+ days.`;

    data.listings.forEach((l, idx) => {
      const srcClass = {
        'Zillow':      'src-zillow',
        'Realtor.com': 'src-realtor',
        'Craigslist':  'src-craigslist',
      }[l.source] || 'src-craigslist';

      const addressLine = l.address
        ? `<div class="address-line">${escHtml(l.address)}</div>` : '';

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="src-badge ${srcClass}">${escHtml(l.source)}</span></td>
        <td class="listing-title">
          <a href="${escHtml(l.url)}" target="_blank" rel="noopener">${escHtml(l.title)}</a>
          ${addressLine}
        </td>
        <td class="price">${l.price ? escHtml(l.price) : '—'}</td>
        <td class="beds-baths">${l.beds_baths ? escHtml(l.beds_baths) : '—'}</td>
        <td>${l.neighborhood ? escHtml(l.neighborhood) : '—'}</td>
        <td>${domBadge(l.days_on_market)}</td>
        <td>${formatDate(l.posted_at)}</td>
        <td>
          <button class="enrich-btn" id="enrich-${idx}" onclick="enrichOwner(${idx})">
            + Enrich
          </button>
        </td>
      `;
      body.appendChild(tr);
    });
  }

  async function enrichOwner(idx) {
    const listing = listingStore[idx];
    const btn     = document.getElementById(`enrich-${idx}`);
    btn.disabled    = true;
    btn.textContent = 'Queuing...';

    try {
      const res = await fetch('/api/enrich', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        // Use the listing title as the owner name stand-in until you have real name data
        body: JSON.stringify({ owner_name: listing.title, listing_url: listing.url }),
      });
      const data = await res.json();

      if (data.ok) {
        btn.className   = 'enrich-btn done';
        btn.textContent = 'Queued';
        showToast(`Lead queued (ID: ${data.lead_id.slice(0,8)}…). Run leadintel to enrich.`, 'ok');
      } else {
        btn.disabled    = false;
        btn.textContent = '+ Enrich';
        showToast(`Enrich error: ${data.error}`, 'err');
      }
    } catch (err) {
      btn.disabled    = false;
      btn.textContent = '+ Enrich';
      showToast(`Request failed: ${err.message}`, 'err');
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 4000);
  }

  function escHtml(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Allow Enter key to trigger search
  document.getElementById('location').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });
</script>
</body>
</html>
